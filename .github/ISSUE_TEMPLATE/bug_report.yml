name: Bug report
description: Something in the CLI, a task, an evaluator, or an agent template is broken.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands run (e.g. `arena show-task retail_sql_001`).
      render: bash
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `arena version`, or the commit SHA you're on.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, how you installed (`pip install -e .` etc).
    validations:
      required: false
